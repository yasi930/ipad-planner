<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="手帳">
    <meta name="description" content="iPad向けデジタル手帳アプリ。月間・週間・日次カレンダーと手書き機能を搭載。">
    <meta name="theme-color" content="#8b5cf6">
    <title>iPad Planner - デジタル手帳</title>
    <!-- PWA マニフェスト -->
    <link rel="manifest" href="manifest.json">
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="icon-192.png">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>

    <div class="app-container">
        <!-- サイドバー -->
        <aside class="sidebar glass-panel">
            <div class="user-profile">
                <div class="avatar"></div>
                <h2>Planner</h2>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" data-view="monthly">月間表示</button>
                <button class="nav-btn" data-view="weekly">週間表示</button>
                <button class="nav-btn" data-view="daily">日次表示</button>
            </nav>
        </aside>

        <!-- メインコンテンツ -->
        <main class="main-content">
            <header class="main-header glass-panel">
                <h1 id="header-title">2026年 6月</h1>
                <div class="header-actions">
                    <button class="icon-btn" id="prev-btn">&lt;</button>
                    <button class="today-btn" id="today-btn">今日</button>
                    <button class="icon-btn" id="next-btn">&gt;</button>
                    <button class="primary-btn" id="add-btn">+ 予定を追加</button>
                    <button class="icon-btn" id="toggle-panel-btn" title="詳細を表示">📋</button>
                </div>
            </header>

            <!-- 1. 月間表示 -->
            <div class="content-body glass-panel view-container active" id="monthly-view">
                <div class="calendar-grid">
                    <div class="calendar-weekdays">
                        <div class="day-name">月</div>
                        <div class="day-name">火</div>
                        <div class="day-name">水</div>
                        <div class="day-name">木</div>
                        <div class="day-name">金</div>
                        <div class="day-name saturday">土</div>
                        <div class="day-name sunday">日</div>
                    </div>
                    <div id="calendar-days" class="calendar-days">
                        <!-- JSで生成 -->
                    </div>
                </div>
            </div>

            <!-- 2. 週間表示 (バーティカル) -->
            <div class="content-body glass-panel view-container" id="weekly-view">
                <div class="weekly-grid">
                    <!-- ヘッダー行 (固定) -->
                    <div class="weekly-header-row">
                        <div class="time-axis-header"></div>
                        <div class="weekly-days-header" id="weekly-days-header">
                            <!-- JSで生成 -->
                        </div>
                    </div>
                    
                    <!-- ボディ行 (スクロール) -->
                    <div class="weekly-body-scroll" id="weekly-scroll-area">
                        <div class="time-axis" id="time-axis">
                            <!-- JSで生成 -->
                        </div>
                        <div class="weekly-columns" id="weekly-columns">
                            <!-- JSで生成 -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 3. 日次表示 -->
            <div class="content-body glass-panel view-container" id="daily-view" style="position: relative;">
                
                <!-- 手書きモード切替とツールバー -->
                <div class="daily-header-actions">
                    <button class="primary-btn" id="toggle-draw-mode">✍️ 手書きモード: OFF</button>
                </div>
                
                <div class="daily-grid">
                    <div class="daily-timeline" id="daily-timeline">
                        <!-- JSで生成 -->
                    </div>
                    <div class="daily-memo-area">
                        <h3>今日のタスク・メモ</h3>
                        <textarea id="daily-memo" placeholder="アイデアやタスクを書き込みましょう..."></textarea>
                    </div>
                </div>

                <!-- 手書きキャンバスレイヤー -->
                <canvas id="daily-canvas" class="daily-canvas pointer-events-none"></canvas>

                <!-- 手書きツールパネル (初期は非表示) -->
                <div class="drawing-tools glass-panel hidden" id="drawing-tools">
                    <button class="tool-btn active" id="tool-pen" title="ペン">✏️</button>
                    <button class="tool-btn" id="tool-marker" title="蛍光ペン">🖍️</button>
                    <button class="tool-btn" id="tool-eraser" title="消しゴム">🧹</button>
                    <div class="tool-separator"></div>
                    <div class="color-picker" id="drawing-color-picker">
                        <div class="color-option active" data-color="#f8fafc" style="background: #f8fafc;"></div>
                        <div class="color-option" data-color="#ef4444" style="background: #ef4444;"></div>
                        <div class="color-option" data-color="#3b82f6" style="background: #3b82f6;"></div>
                        <div class="color-option" data-color="#10b981" style="background: #10b981;"></div>
                        <div class="color-option" data-color="#f59e0b" style="background: #f59e0b;"></div>
                    </div>
                    <div class="tool-separator"></div>
                    <button class="icon-btn" id="clear-canvas-btn" style="font-size: 0.9rem;" title="全消去">🗑️</button>
                </div>
            </div>

        </main>

        <!-- 右側パネル -->
        <aside class="detail-panel glass-panel" id="right-panel">
            <div class="panel-header">
                <h2 id="selected-date-title">6月16日 (火)</h2>
            </div>
            <div class="timeline-container" id="right-panel-events">
                <div class="empty-state">
                    <p>予定はありません</p>
                </div>
            </div>
            <div class="quick-memo">
                <h3>メモ</h3>
                <textarea id="side-memo" placeholder="ここに入力..." class="memo-input"></textarea>
            </div>
        </aside>
    </div>

    <!-- 新規予定追加モーダル -->
    <div class="modal-overlay" id="event-modal">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2 id="modal-title-text">新しい予定</h2>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>タイトル</label>
                    <input type="text" id="event-title" placeholder="会議、ランチなど" autocomplete="off">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>日付</label>
                        <input type="date" id="event-date">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>開始時間</label>
                        <input type="time" id="event-start" value="10:00">
                    </div>
                    <div class="form-group">
                        <label>終了時間</label>
                        <input type="time" id="event-end" value="11:00">
                    </div>
                </div>
                <div class="form-group">
                    <label>カラー</label>
                    <div class="color-picker" id="event-color">
                        <div class="color-option active" data-color="#8b5cf6" style="background: #8b5cf6;"></div>
                        <div class="color-option" data-color="#3b82f6" style="background: #3b82f6;"></div>
                        <div class="color-option" data-color="#10b981" style="background: #10b981;"></div>
                        <div class="color-option" data-color="#f59e0b" style="background: #f59e0b;"></div>
                        <div class="color-option" data-color="#ef4444" style="background: #ef4444;"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>詳細・メモ</label>
                    <textarea id="event-desc" placeholder="詳細を入力..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-modal">キャンセル</button>
                <button class="primary-btn" id="save-event-btn">保存</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Service Worker の登録 (PWA対応・オフライン動作)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('[PWA] Service Worker 登録完了:', reg.scope))
                    .catch(err => console.warn('[PWA] Service Worker 登録失敗:', err));
            });
        }
    </script>
</body>
</html>
